<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBERGO Driver Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 0.95em;
            opacity: 0.95;
        }
        
        .tabs {
            display: flex;
            background: #f9f9f9;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-button {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: #999;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        
        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-button:hover {
            color: #667eea;
        }
        
        .content {
            padding: 40px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        
        label {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #f9f9f9;
            color: #333;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message-link {
            display: block;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .message-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 8px;
        }
        
        .message-link a:hover {
            color: #764ba2;
            transform: translateX(4px);
        }
        
        @media (max-width: 480px) {
            .content {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 1.6em;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>UBERGO</h1>
                <p>Driver Portal</p>
            </div>
            
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('register')">Register</button>
                <button class="tab-button" onclick="switchTab('login')">Login</button>
                <button class="tab-button" onclick="switchTab('login_id')">Login by ID</button>
            </div>
            
            <div class="content">
                <div id="register" class="tab-content active">
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="reg_name">Full Name</label>
                            <input type="text" id="reg_name" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label for="reg_phone">Phone Number</label>
                            <input type="tel" id="reg_phone" placeholder="Enter your phone" required>
                        </div>
                        <button type="submit">Register</button>
                    </form>
                </div>
                
                <div id="login" class="tab-content">
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="login_phone">Phone Number</label>
                            <input type="tel" id="login_phone" placeholder="Enter your phone" required>
                        </div>
                        <button type="submit">Login with Phone</button>
                    </form>
                </div>
                
                <div id="login_id" class="tab-content">
                    <form id="loginIdForm">
                        <div class="form-group">
                            <label for="login_driver_id">Driver ID</label>
                            <input type="number" id="login_driver_id" placeholder="Enter your Driver ID (e.g., 7)" required>
                        </div>
                        <button type="submit">Login with ID</button>
                    </form>
                    <p style="margin-top: 15px; color: #666; font-size: 0.85em;">
                        Use this if a ride was assigned to your Driver ID and you need to access your portal.
                    </p>
                </div>
                
                <div id="message"></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg_name').value;
            const phone = document.getElementById('reg_phone').value;
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('success', 
                        `Registration successful!<br>
                        <strong>Driver ID:</strong> #${data.id}<br>
                        <strong>Phone:</strong> ${data.phone}<br>
                        <strong>Port:</strong> ${data.assigned_port}<br>
                        <div class="message-link">
                            <a href="http://localhost:${data.assigned_port}" target="_blank">Open Your Portal</a>
                        </div>`
                    );
                    document.getElementById('registerForm').reset();
                } else {
                    showMessage('error', (data.detail || 'Registration failed'));
                }
            } catch (error) {
                showMessage('error', error.message);
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('login_phone').value;
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `phone=${encodeURIComponent(phone)}`
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('success', 
                        `Login successful!<br>
                        <strong>Driver ID:</strong> #${data.id}<br>
                        <strong>Name:</strong> ${data.name}<br>
                        <strong>Port:</strong> ${data.assigned_port}<br>
                        <div class="message-link">
                            <a href="http://localhost:${data.assigned_port}" target="_blank">Open Your Portal</a>
                        </div>`
                    );
                    document.getElementById('loginForm').reset();
                } else {
                    showMessage('error', (data.detail || 'Login failed'));
                }
            } catch (error) {
                showMessage('error', error.message);
            }
        });
        
        document.getElementById('loginIdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const driverId = document.getElementById('login_driver_id').value;
            
            try {
                const response = await fetch('/login_by_id', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `driver_id=${encodeURIComponent(driverId)}`
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('success', 
                        `Login successful!<br>
                        <strong>Driver ID:</strong> #${data.id}<br>
                        <strong>Name:</strong> ${data.name}<br>
                        <strong>Phone:</strong> ${data.phone}<br>
                        <strong>Port:</strong> ${data.assigned_port}<br>
                        <div class="message-link">
                            <a href="http://localhost:${data.assigned_port}" target="_blank">Open Your Portal</a>
                        </div>`
                    );
                    document.getElementById('loginIdForm').reset();
                } else {
                    showMessage('error', (data.detail || 'Driver ID not found'));
                }
            } catch (error) {
                showMessage('error', error.message);
            }
        });
        
        function showMessage(type, text) {
            const msg = document.getElementById('message');
            msg.className = type === 'success' ? 'message-success' : 'message-error';
            msg.innerHTML = text;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
