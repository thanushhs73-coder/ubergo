<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBERGO User Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 0.95em;
            opacity: 0.95;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .form-section:last-child {
            margin-bottom: 0;
        }
        
        .form-section h2 {
            font-size: 1em;
            color: #333;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            font-size: 0.9em;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        
        label {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #f9f9f9;
            color: #333;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .divider {
            margin: 30px 0;
            padding: 30px 0;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
            color: #999;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        #message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message-link {
            display: block;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .message-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 8px;
        }
        
        .message-link a:hover {
            color: #764ba2;
            transform: translateX(4px);
        }
        
        @media (max-width: 480px) {
            .content {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 1.6em;
            }
            
            .header {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>UBERGO</h1>
                <p>User Portal</p>
            </div>
            
            <div class="content">
                <div class="form-section">
                    <h2>Create Account</h2>
                    <form id="createForm">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" placeholder="Enter your full name" required>
                        </div>
                        <button type="submit">Create Account</button>
                    </form>
                </div>
                
                <div class="divider">Or Login</div>
                
                <div class="form-section">
                    <h2>Login by User ID</h2>
                    <form id="loginIdForm">
                        <div class="form-group">
                            <label for="user_id">User ID</label>
                            <input type="number" id="user_id" placeholder="Enter your User ID (e.g., 6)" required>
                        </div>
                        <button type="submit">Login with ID</button>
                    </form>
                    <p style="margin-top: 10px; color: #666; font-size: 0.85em;">
                        Your User ID was shown when you created your account.
                    </p>
                </div>
                
                <div id="message"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            
            try {
                const response = await fetch('/create_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'name=' + encodeURIComponent(name)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('success', 
                        `Account created successfully!<br>
                        <strong>User ID:</strong> #${data.id} (save this!)<br>
                        <strong>Port:</strong> ${data.user_port}<br>
                        <div class="message-link">
                            <a href="http://localhost:${data.user_port}" target="_blank">Open Your Portal</a>
                        </div>`
                    );
                    document.getElementById('createForm').reset();
                } else {
                    showMessage('error', (data.detail || 'Failed to create account'));
                }
            } catch (error) {
                showMessage('error', error.message);
            }
        });
        
        document.getElementById('loginIdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('user_id').value;
            
            try {
                const response = await fetch('/login_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'user_id=' + encodeURIComponent(userId)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('success', 
                        `Login successful!<br>
                        <strong>User ID:</strong> #${data.id}<br>
                        <strong>Name:</strong> ${data.name}<br>
                        <strong>Port:</strong> ${data.user_port}<br>
                        <div class="message-link">
                            <a href="http://localhost:${data.user_port}" target="_blank">Open Your Portal</a>
                        </div>`
                    );
                    document.getElementById('loginIdForm').reset();
                } else {
                    showMessage('error', (data.detail || 'User ID not found'));
                }
            } catch (error) {
                showMessage('error', error.message);
            }
        });
        
        function showMessage(type, text) {
            const msg = document.getElementById('message');
            msg.className = type === 'success' ? 'message-success' : 'message-error';
            msg.innerHTML = text;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
